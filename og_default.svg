<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 배경 그라디언트 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0b"/>
      <stop offset="100%" style="stop-color:#111008"/>
    </linearGradient>
    <!-- 골드 글로우 -->
    <radialGradient id="glow" cx="30%" cy="55%" r="50%">
      <stop offset="0%" style="stop-color:#c8963e;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0d0d0b;stop-opacity:0"/>
    </radialGradient>
    <!-- 노이즈 필터 -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- 그리드 라인 -->
  <g opacity="0.04" stroke="#c8963e" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="105" y1="0" x2="105" y2="630"/>
    <line x1="210" y1="0" x2="210" y2="630"/>
    <line x1="315" y1="0" x2="315" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="525" y1="0" x2="525" y2="630"/>
    <line x1="630" y1="0" x2="630" y2="630"/>
    <line x1="735" y1="0" x2="735" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="945" y1="0" x2="945" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
    <line x1="1155" y1="0" x2="1155" y2="630"/>
  </g>

  <!-- 수직 골드 라인 -->
  <line x1="900" y1="0" x2="900" y2="630" stroke="#c8963e" stroke-width="1" opacity="0.15"/>

  <!-- 좌측 골드 수직 바 -->
  <rect x="72" y="160" width="3" height="260" fill="#c8963e" opacity="0.6"/>

  <!-- 메인 타이틀 F3YNM4N -->
  <text x="100" y="290" font-family="'Courier New', monospace" font-size="96" font-weight="700" fill="#c8963e" letter-spacing="8">F3YNM4N</text>

  <!-- 슬래시 -->
  <text x="100" y="360" font-family="'Courier New', monospace" font-size="22" font-weight="400" fill="#f2ede6" opacity="0.4" letter-spacing="3">/ INDEPENDENT MAGAZINE</text>

  <!-- 하단 태그라인 -->
  <text x="100" y="460" font-family="Georgia, serif" font-size="26" font-weight="400" fill="#f2ede6" opacity="0.65" font-style="italic">직관을 먼저 던지고, 구조로 증명합니다.</text>

  <!-- 카테고리 태그들 -->
  <g font-family="'Courier New', monospace" font-size="13" fill="#c8963e" opacity="0.5" letter-spacing="2">
    <text x="100" y="520">SCIENCE</text>
    <text x="220" y="520">·</text>
    <text x="240" y="520">FILM</text>
    <text x="320" y="520">·</text>
    <text x="340" y="520">CULTURE</text>
    <text x="460" y="520">·</text>
    <text x="480" y="520">HISTORY</text>
    <text x="600" y="520">·</text>
    <text x="620" y="520">FOOD</text>
  </g>

  <!-- 우측 도메인 -->
  <text x="940" y="580" font-family="'Courier New', monospace" font-size="18" font-weight="700" fill="#c8963e" opacity="0.5" letter-spacing="2">f3ynm4n.com</text>

  <!-- 노이즈 오버레이 -->
  <rect width="1200" height="630" fill="transparent" filter="url(#noise)" opacity="0.03"/>

  <!-- 하단 골드 라인 -->
  <rect x="0" y="620" width="1200" height="2" fill="url(#bg)"/>
  <rect x="72" y="618" width="400" height="2" fill="#c8963e" opacity="0.4"/>
</svg>
