<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

<script>
const SUPABASE_URL = 'https://zbjurkhbumuqeusceknb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_NCDATxds6xSoM7ecxuZxpQ_GLLYq0hF';

const CAT_NAMES = {
  food:'미식', science:'팝사이언스', film:'영화비평',
  history:'대체역사', culture:'문화칼럼', fiction:'창작'
};

async function fetchArticle(slug) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/articles?slug=eq.${encodeURIComponent(slug)}&published=eq.true&limit=1`,
    { headers: { 'apikey': SUPABASE_KEY } }
  );
  const data = await res.json();
  return data[0] || null;
}

async function fetchRelated(category, currentSlug) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/articles?category=eq.${category}&published=eq.true&slug=neq.${encodeURIComponent(currentSlug)}&order=created_at.desc&limit=3`,
    { headers: { 'apikey': SUPABASE_KEY } }
  );
  return await res.json();
}

async function fetchPrevNext(createdAt, currentSlug) {
  const [prevRes, nextRes] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/articles?published=eq.true&created_at=lt.${encodeURIComponent(createdAt)}&slug=neq.${encodeURIComponent(currentSlug)}&order=created_at.desc&limit=1`, { headers: { 'apikey': SUPABASE_KEY } }),
    fetch(`${SUPABASE_URL}/rest/v1/articles?published=eq.true&created_at=gt.${encodeURIComponent(createdAt)}&slug=neq.${encodeURIComponent(currentSlug)}&order=created_at.asc&limit=1`,  { headers: { 'apikey': SUPABASE_KEY } })
  ]);
  const [prev, next] = await Promise.all([prevRes.json(), nextRes.json()]);
  return { prev: prev[0] || null, next: next[0] || null };
}

async function fetchSeries(seriesName) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/articles?series_name=eq.${encodeURIComponent(seriesName)}&published=eq.true&order=series_order.asc`,
    { headers: { 'apikey': SUPABASE_KEY } }
  );
  return await res.json();
}

function nl2html(text) {
  // HTML 태그가 이미 있으면 그대로
  if (text.includes('<p>') || text.includes('<h2>')) return text;

  // 줄바꿈 정규화: 
 

  text = text.replace(/\r\n/g, '\n');

  // 빈 줄(\n\n 이상) → 단락 구분
  // 단일 줄바꿈 → <br>
  const paragraphs = text.split(/\n{2,}/);
  return paragraphs
    .map(p => p.trim())
    .filter(p => p.length > 0)
    .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
    .join('\n');
}

const CAT_LABELS = {
  food:'미식', science:'팝사이언스', film:'영화비평',
  history:'대체역사', culture:'문화칼럼', fiction:'창작'
};

async function fetchCategory(cat) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/articles?category=eq.${cat}&published=eq.true&order=created_at.desc`,
    { headers: { 'apikey': SUPABASE_KEY } }
  );
  return await res.json();
}

async function showCategoryList(cat) {
  const label = CAT_LABELS[cat] || cat;
  document.title = `${label} · F3YNM4N`;

  const articles = await fetchCategory(cat);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('article-wrap').style.display = 'block';

  // 히어로를 카테고리 헤더로
  document.getElementById('article-tag').textContent = 'Category';
  document.getElementById('article-title').textContent = label;
  document.getElementById('article-subtitle').textContent = `${articles.length}개의 글`;
  document.getElementById('article-meta').innerHTML = '';
  document.getElementById('series-nav-wrap').innerHTML = '';

  if (articles.length === 0) {
    document.getElementById('article-content').innerHTML =
      '<p style="color:var(--mid);padding:20px 0;">아직 글이 없습니다.</p>';
    return;
  }

  const html = articles.map(a => `
    <a href="article.html?slug=${a.slug}"
       style="display:block;padding:28px;border:1px solid var(--border);text-decoration:none;color:inherit;margin-bottom:2px;transition:background .2s;"
       onmouseover="this.style.background='rgba(200,150,62,0.04)'"
       onmouseout="this.style.background='transparent'">
      <div style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;">${a.tag}</div>
      <div style="font-family:'Noto Serif KR',serif;font-size:20px;font-weight:700;line-height:1.3;color:var(--off-white);margin-bottom:8px;">${a.title}</div>
      <p style="font-size:13px;line-height:1.7;color:var(--mid);margin-bottom:12px;">${a.subtitle || ''}</p>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--gold);">읽기 →</div>
    </a>`).join('');

  document.getElementById('article-content').innerHTML = html;
}

async function init() {
  const params = new URLSearchParams(location.search);
  const slug = params.get('slug');
  const cat  = params.get('cat');

  // 카테고리 목록 모드
  if (cat) { await showCategoryList(cat); return; }

  if (!slug) { showNotFound(); return; }

  const article = await fetchArticle(slug);
  if (!article) { showNotFound(); return; }

  // href가 있으면 해당 HTML 파일로 바로 이동
  if (article.href) {
    location.href = article.href;
    return;
  }

  // 페이지 타이틀
  document.title = `${article.title} · F3YNM4N`;

  // 커버 배경색
  if (article.cover_color) {
    document.querySelector('.article-hero').style.background = article.cover_color;
  }

  // 창작이면 fiction 클래스 추가
  if (article.category === 'fiction') {
    document.getElementById('article-body').classList.add('fiction');
  }

  // 헤더 채우기
  document.getElementById('article-tag').textContent = article.tag || CAT_NAMES[article.category] || '';
  document.getElementById('article-title').textContent = article.title;

  // 제목 길이에 따라 폰트 크기 자동 조정
  const titleEl = document.getElementById('article-title');
  const len = article.title.length;
  if (len > 20) titleEl.style.fontSize = 'clamp(24px, 3.5vw, 44px)';
  else if (len > 14) titleEl.style.fontSize = 'clamp(28px, 4vw, 52px)';
  else titleEl.style.fontSize = 'clamp(32px, 5vw, 64px)';
  document.getElementById('article-subtitle').textContent = article.subtitle || '';

  const wordCount = (article.content || '').replace(/<[^>]*>/g, '').length;
  const readMin = Math.max(1, Math.round(wordCount / 500));
  const date = new Date(article.created_at).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
  document.getElementById('article-meta').innerHTML = `
    <div class="meta-item"><strong>카테고리</strong>${CAT_NAMES[article.category] || article.category}</div>
    <div class="meta-sep"></div>
    <div class="meta-item"><strong>작성일</strong>${date}</div>
    <div class="meta-sep"></div>
    <div class="meta-item"><strong>읽기</strong>약 ${readMin}분</div>
    ${article.is_series ? `<div class="meta-sep"></div><div class="meta-item"><strong>시리즈</strong>${article.series_name} ${article.series_order}화</div>` : ''}
  `;

  // 시리즈 네비
  if (article.is_series && article.series_name) {
    const series = await fetchSeries(article.series_name);
    if (series.length > 1) {
      const epHtml = series.map(ep => `
        <a href="article.html?slug=${ep.slug}" class="series-ep ${ep.slug === slug ? 'current' : ''}">
          <span class="series-ep-num">${String(ep.series_order).padStart(2,'0')}</span>
          ${ep.title}
        </a>`).join('');
      document.getElementById('series-nav-wrap').innerHTML = `
        <div class="series-nav">
          <div class="series-nav-label">${article.series_name}</div>
          ${epHtml}
        </div>`;
    }
  }

  // 본문
  document.getElementById('article-content').innerHTML = nl2html(article.content);

  // 이전/다음 글
  const { prev, next } = await fetchPrevNext(article.created_at, slug);
  if (prev || next) {
    const navEl = document.getElementById('article-nav');
    navEl.className = 'article-nav';
    navEl.innerHTML = `
      ${prev ? `<a href="article.html?slug=${prev.slug}" class="article-nav-item prev">
        <div class="article-nav-dir">← 이전 글</div>
        <div class="article-nav-title">${prev.title}</div>
      </a>` : '<div></div>'}
      ${next ? `<a href="article.html?slug=${next.slug}" class="article-nav-item next">
        <div class="article-nav-dir">다음 글 →</div>
        <div class="article-nav-title">${next.title}</div>
      </a>` : '<div></div>'}
    `;
    navEl.style.display = 'grid';
  }

  // 연관 글
  const related = await fetchRelated(article.category, slug);
  if (related.length > 0) {
    const relHtml = related.map(r => `
      <a href="article.html?slug=${r.slug}" class="related-card">
        <div class="related-card-tag">${r.tag}</div>
        <div class="related-card-title">${r.title}</div>
        <div class="related-card-arrow">읽기 →</div>
      </a>`).join('');
    document.getElementById('related-grid').innerHTML = relHtml;
    document.getElementById('related-wrap').style.display = 'block';
  }

  // 표시
  document.getElementById('loading').style.display = 'none';
  document.getElementById('article-wrap').style.display = 'block';
}

function showNotFound() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('not-found').style.display = 'flex';
}

// 커스텀 커서 (터치 디바이스 비활성화)
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
if (isTouchDevice) {
  cursor.style.display = 'none';
  ring.style.display = 'none';
  document.body.style.cursor = 'auto';
} else {
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; cursor.style.left = mx+'px'; cursor.style.top = my+'px'; });
  (function loop() { rx += (mx-rx)*.12; ry += (my-ry)*.12; ring.style.left=rx+'px'; ring.style.top=ry+'px'; requestAnimationFrame(loop); })();
}

// 읽기 진행 바
window.addEventListener('scroll', () => {
  const doc = document.documentElement;
  const scrolled = doc.scrollTop || document.body.scrollTop;
  const total = doc.scrollHeight - doc.clientHeight;
  const pct = total > 0 ? (scrolled / total) * 100 : 0;
  document.getElementById('readingProgress').style.width = pct + '%';
});

// bfcache 복원 시 재실행 방지
window.addEventListener('pageshow', (e) => {
  if (e.persisted) return; // bfcache에서 즉시 복원 — 재실행 불필요
  init();
});</script>
