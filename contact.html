<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f0e8;--bg2:#ede8e0;--text:#1a1814;--text-mid:#4a4540;--text-muted:#7a7468;
  --gold:#c8963e;--border:rgba(200,150,62,0.18);--border2:rgba(200,150,62,0.3);
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;cursor:none;}
.cursor{position:fixed;width:6px;height:6px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid rgba(200,150,62,.4);border-radius:50%;pointer-events:none;z-index:9998;transition:all .25s;transform:translate(-50%,-50%);}
header{position:fixed;top:0;left:0;right:0;z-index:50;padding:16px 48px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border2);background:rgba(245,240,232,.95);backdrop-filter:blur(12px);}
.logo{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px;text-decoration:none;}
.logo span{color:var(--text-muted);opacity:.6;}
.header-home{font-size:11px;letter-spacing:2px;color:var(--text-muted);text-decoration:none;text-transform:uppercase;transition:color .2s;}
.header-home:hover{color:var(--gold);}

.hero{min-height:50vh;padding-top:60px;display:flex;flex-direction:column;justify-content:flex-end;position:relative;overflow:hidden;background:#0d0d0b;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%, rgba(200,150,62,.1) 0%, transparent 52%),linear-gradient(180deg,#0d0d0b 0%,#111008 100%);}
.hero-inner{position:relative;z-index:2;padding:0 48px 72px;max-width:760px;}
.hero-tag{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:10px;opacity:0;animation:fadeUp .8s ease forwards .2s;}
.hero-tag::before{content:'';display:inline-block;width:20px;height:1px;background:var(--gold);}
.hero-title{font-family:'Noto Serif KR',serif;font-size:clamp(36px,5vw,60px);font-weight:700;line-height:1.25;letter-spacing:-0.025em;color:#f2ede6;margin-bottom:24px;opacity:0;animation:fadeUp .8s ease forwards .4s;}
.hero-sub{font-size:16px;font-weight:300;color:#6a6560;line-height:1.9;max-width:480px;opacity:0;animation:fadeUp .8s ease forwards .6s;}

.body-wrap{max-width:640px;margin:0 auto;padding:80px 48px 120px;}

.contact-block{padding:48px;background:var(--bg2);border:1px solid var(--border2);position:relative;margin-bottom:32px;}
.contact-block::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),rgba(200,150,62,.3),transparent);}
.contact-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:24px;display:flex;align-items:center;gap:10px;}
.contact-label::after{content:'';flex:1;height:1px;background:var(--border2);}
.contact-desc{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:300;color:var(--text-mid);line-height:2;margin-bottom:32px;}
.contact-email{display:inline-flex;align-items:center;gap:12px;font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--gold);text-decoration:none;padding:16px 24px;border:1px solid var(--border2);background:var(--bg);transition:all .2s;}
.contact-email:hover{background:var(--bg2);border-color:var(--gold);}
.contact-email span{font-size:18px;}

.note{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted);line-height:1.8;letter-spacing:.5px;}

footer{border-top:1px solid var(--border2);padding:28px 48px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);}
.footer-logo{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:2px;text-decoration:none;}
.footer-meta{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:1px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:640px){header{padding:14px 20px;},.hero-inner{padding:0 20px 56px;}.body-wrap{padding:56px 20px 80px;}footer{padding:24px 20px;flex-direction:column;gap:8px;}}
</style>

<div class="body-wrap">
  <div class="contact-block">
    <div class="contact-label">Email</div>
    <p class="contact-desc">글에 대한 의견, 협업 제안, 기고 문의는 아래 이메일로 보내주세요. 가능한 한 빠르게 답변드리겠습니다.</p>

  <p class="note">※ 광고·스팸·무관한 홍보성 메일은 별도 안내 없이 삭제될 수 있습니다.</p>
</div>
<footer>
  <a href="index.html" class="footer-logo">F3YNM4N</a>
  <span class="footer-meta">Independent Magazine · 2026</span>
</footer>
<script>
const cursor=document.getElementById('cursor');
const ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
(function animRing(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing)})();
</script>

<style>
.f3-share-btn{
  position:fixed;bottom:36px;right:36px;z-index:1000;
  display:flex;flex-direction:column;align-items:flex-end;gap:10px;
}
.f3-share-toggle{
  width:44px;height:44px;border-radius:50%;
  background:#c8963e;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s,background .2s;
  box-shadow:0 2px 12px rgba(200,150,62,.35);
}
.f3-share-toggle:hover{background:#d4a44a;transform:scale(1.08);}
.f3-share-toggle svg{width:18px;height:18px;fill:none;stroke:#0d0d0b;stroke-width:2;stroke-linecap:round;}
.f3-share-panel{
  display:flex;flex-direction:column;gap:6px;
  opacity:0;transform:translateY(8px) scale(.96);
  pointer-events:none;
  transition:opacity .18s ease,transform .18s ease;
}
.f3-share-panel.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all;}
.f3-share-item{
  display:flex;align-items:center;gap:10px;
  background:#0d0d0b;border:1px solid rgba(200,150,62,.3);
  padding:10px 16px;cursor:pointer;
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;
  color:#c8963e;text-transform:uppercase;white-space:nowrap;
  transition:background .15s,border-color .15s;text-decoration:none;
}
.f3-share-item:hover{background:#1a1814;border-color:rgba(200,150,62,.6);}
.f3-share-item .f3-share-icon{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.f3-share-toast{
  position:fixed;bottom:100px;right:36px;z-index:1001;
  background:#0d0d0b;border:1px solid rgba(200,150,62,.4);
  padding:10px 18px;
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1.5px;color:#c8963e;
  opacity:0;transform:translateY(4px);
  transition:opacity .2s,transform .2s;pointer-events:none;
}
.f3-share-toast.show{opacity:1;transform:translateY(0);}
@media(max-width:640px){
  .f3-share-btn{bottom:24px;right:20px;}
  .f3-share-toast{right:20px;bottom:90px;}
}
</style>

<div class="f3-share-btn" id="f3ShareBtn">

        </svg>
      </span>

    <button class="f3-share-item" onclick="f3ShareKakao()">

        </svg>
      </span>

    </button>

    <svg viewBox="0 0 24 24">
      <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>

    </svg>
  </button>
</div>

<div class="f3-share-toast" id="f3Toast">URL 복사됨</div>

<script>
(function(){
  var KAKAO_KEY='e0642d0a5c0ae01b8893422a148e9aba';
  function loadKakaoSDK(cb){
    if(window.Kakao){cb();return;}
    var s=document.createElement('script');
    s.src='https://developers.kakao.com/sdk/js/kakao.min.js';
    s.onload=function(){if(KAKAO_KEY&&!Kakao.isInitialized())Kakao.init(KAKAO_KEY);cb();};
    document.head.appendChild(s);
  }
  var panelOpen=false;
  window.f3ToggleShare=function(){
    panelOpen=!panelOpen;
    document.getElementById('f3SharePanel').classList.toggle('open',panelOpen);
  };
  window.f3CopyUrl=function(){
    var url=location.href;
    navigator.clipboard.writeText(url).then(function(){showToast('URL 복사됨');}).catch(function(){
      var ta=document.createElement('textarea');
      ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('URL 복사됨');
    });
    panelOpen=false;document.getElementById('f3SharePanel').classList.remove('open');
  };
  var xLink=document.getElementById('f3ShareX');
  if(xLink){xLink.href='https://twitter.com/intent/tweet?text='+encodeURIComponent(document.title||'F3YNM4N')+'&url='+encodeURIComponent(location.href);}
  window.f3ShareKakao=function(){
    if(!KAKAO_KEY){showToast('카카오 앱키 필요');return;}
    loadKakaoSDK(function(){
      var desc=document.querySelector('meta[name="description"]');
      Kakao.Share.sendDefault({objectType:'feed',content:{title:document.title||'F3YNM4N',description:desc?desc.content:'',imageUrl:'https://f3ynm4n.com/og_default.png',link:{mobileWebUrl:location.href,webUrl:location.href}},buttons:[{title:'읽기',link:{mobileWebUrl:location.href,webUrl:location.href}}]});
    });
  };
  function showToast(msg){var t=document.getElementById('f3Toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
  document.addEventListener('click',function(e){
    if(!document.getElementById('f3ShareBtn').contains(e.target)){panelOpen=false;document.getElementById('f3SharePanel').classList.remove('open');}
  });
})();
</script>
